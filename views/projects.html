<div class="projects-inner">
  <div class="ornament">◈</div>
  <p class="section-sub">Work</p>
  <h2>Projects</h2><br>
  <div class="project-grid">
    <div class="project-card" ng-repeat="p in projects">
      <div class="project-accent"></div>
      <h3>{{ p.title }}</h3>
      <p>{{ p.description }}</p>
      <div class="project-tags">
        <span class="tag" ng-repeat="tag in p.tags">{{ tag }}</span>
      </div>
    </div>
  </div>
</div>
