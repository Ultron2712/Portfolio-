<div class="home-inner">
  <div class="hero-content">
    <div class="hero-label"><span class="dot"></span>&nbsp; Available for work</div>
    <h1>Hello, I'm<br><span class="name">{{ profile.name }}</span></h1>
    <div class="typing-wrap">{{ typingText }}</div>
    <p>{{ profile.bio }}</p>
    <a href="{{ profile.resumeUrl }}" class="btn" download="Tejas_Luhar_Resume.pdf">
      <i class="fas fa-arrow-down"></i> Download Resume
    </a>
  </div>
  <div class="profile-wrap">
    <div class="profile-ring">
      <img src="profile.jpg" class="profile" alt="Tejas Luhar">
    </div>
  </div>
</div>
