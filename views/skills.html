<div class="glass skills-card" ng-controller="SkillsCtrl">
  <div class="ornament">◆</div>
  <p class="section-sub">Technical Skills</p>
  <h2>Technologies I Work With</h2><br>
  <div class="skill" ng-repeat="skill in skills">
    <div class="skill-row">
      <p>{{ skill.name }}</p>
      <span>{{ skill.level }}%</span>
    </div>
    <div class="bar">
      <span class="bar-fill" ng-style="{'width': skillsVisible ? skill.level+'%' : '0%'}"></span>
    </div>
  </div>
</div>
